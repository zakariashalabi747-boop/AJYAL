<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>AL AJYAL - نظام الموظفين والإجازات</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;800&family=Tajawal:wght@400;500;700&display=swap');
  :root{
    --bg:#F5F3EC; --surface:#FFFFFF; --ink:#1E2A2C; --ink-soft:#657072;
    --border:#E6DEDD; --primary:#8D3532; --primary-light:#F1E6E6; --primary-dark:#4D1D1B;
    --sick:#3B5B7A; --sick-light:#E7EDF2; --emg:#C98A2C; --emg-light:#FAF0DF; --danger:#B23A48; --success:#2E7D5B;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Tajawal',sans-serif;min-height:100vh;}
  input,select,textarea{font-family:'Tajawal',sans-serif;}
  ::placeholder{color:#9BA3A4;}
  button{cursor:pointer;font-family:'Tajawal',sans-serif;border:none;}
  button:disabled{opacity:.6;cursor:not-allowed;}
  header.app-header{background:var(--primary-dark);color:#fff;border-bottom:4px solid var(--primary);
    padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:40px;height:40px;border-radius:10px;background:var(--primary);display:flex;align-items:center;justify-content:center;
    font-family:'Cairo',sans-serif;font-weight:800;color:#fff;font-size:16px;flex-shrink:0;}
  .brand-name{font-family:'Cairo',sans-serif;font-weight:800;font-size:19px;line-height:1;}
  .brand-sub{font-size:11px;color:rgba(255,255,255,.8);margin-top:4px;}
  .header-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .user-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
    border-radius:999px;padding:6px 12px;font-size:12px;color:#fff;}
  .btn{border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;transition:opacity .15s;}
  .btn:hover{opacity:.9;}
  .btn-white{background:#fff;color:var(--primary-dark);}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--ink);}
  .app-header .btn-outline{color:#fff;border-color:rgba(255,255,255,.5);}
  .app-header .btn-outline:hover{background:rgba(255,255,255,.1);}
  .btn-danger-outline{background:transparent;border:1px solid #E8C9CC;color:var(--danger);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-sm{padding:6px 10px;font-size:12px;}
  nav.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:4px;}
  nav.tabs button{background:transparent;padding:12px 16px;font-size:14px;color:var(--ink-soft);border-bottom:3px solid transparent;}
  nav.tabs button.active{color:var(--primary);font-weight:800;border-bottom-color:var(--primary);}
  .layout{display:flex;min-height:calc(100vh - 118px);}
  @media (max-width:760px){.layout{flex-direction:column;}}
  aside.sidebar{width:300px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);padding:16px;}
  @media (max-width:760px){aside.sidebar{width:100%;border-left:none;border-bottom:1px solid var(--border);}}
  .search-wrap{position:relative;margin-bottom:14px;}
  .search-wrap input{width:100%;padding:9px 34px 9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-size:13px;outline:none;}
  .search-wrap svg{position:absolute;right:10px;top:9px;color:var(--ink-soft);}
  .emp-row{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:right;
    background:transparent;border:1px solid transparent;border-radius:8px;padding:10px;margin-bottom:6px;font-family:'Tajawal',sans-serif;}
  .emp-row:hover{opacity:.9;}
  .emp-row.selected{background:var(--primary-light);border-color:var(--primary);}
  .emp-avatar{width:32px;height:32px;border-radius:999px;display:flex;align-items:center;justify-content:center;
    font-family:'Cairo',sans-serif;font-weight:800;font-size:13px;background:var(--border);color:var(--ink);flex-shrink:0;}
  .emp-row.selected .emp-avatar{background:var(--primary);color:#fff;}
  .emp-name{font-size:13px;font-weight:700;}
  .emp-sub{font-size:11px;color:var(--ink-soft);}
  main.content{flex:1;padding:20px;max-width:100%;}
  @media (min-width:760px){main.content{padding:28px;}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;}
  .empty-state{text-align:center;color:var(--ink-soft);padding:60px 20px;}
  .section-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:18px;margin:0 0 12px;}
  .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;border-top:1px dashed var(--border);margin-top:18px;padding-top:18px;}
  @media (min-width:640px){.info-grid{grid-template-columns:repeat(4,1fr);}}
  .info-field .info-label{font-size:11px;color:var(--ink-soft);display:flex;align-items:center;gap:4px;margin-bottom:3px;}
  .info-field .info-value{font-weight:700;font-size:14px;}
  .leave-cards{display:grid;grid-template-columns:1fr;gap:12px;}
  @media (min-width:640px){.leave-cards{grid-template-columns:repeat(3,1fr);}}
  .leave-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;border-top:4px solid var(--primary);}
  .leave-card .lt-title{font-weight:800;font-size:13px;margin-bottom:8px;}
  .leave-card .lt-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .leave-card label{font-size:11px;color:var(--ink-soft);display:block;margin-bottom:3px;}
  .leave-card input[type=number]{width:100%;border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:13px;background:var(--bg);}
  .rem-pill{border-radius:8px;padding:8px 12px;font-size:13px;font-weight:800;display:flex;justify-content:space-between;}
  table.datatable{width:100%;border-collapse:collapse;font-size:13px;min-width:560px;}
  table.datatable thead tr{background:var(--primary-light);color:var(--primary-dark);}
  table.datatable th,table.datatable td{padding:9px 10px;text-align:right;}
  table.datatable tbody tr{border-top:1px solid var(--border);}
  table.datatable tbody tr:nth-child(even){background:var(--bg);}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow-x:auto;}
  .badge{border-radius:999px;padding:3px 9px;font-size:11px;font-weight:800;}
  .modal-overlay{position:fixed;inset:0;background:rgba(20,25,26,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:60;}
  .modal-box{background:var(--surface);max-width:440px;width:100%;max-height:90vh;overflow-y:auto;border-radius:16px;padding:20px;}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .modal-head h3{font-family:'Cairo',sans-serif;font-weight:800;font-size:17px;margin:0;}
  .modal-head button{background:none;color:var(--ink-soft);font-size:18px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--ink-soft);font-weight:800;margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:14px;outline:none;background:var(--bg);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .icon-btn{background:none;color:var(--ink-soft);}
  .icon-btn.danger{color:var(--danger);}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--primary-dark);color:#fff;
    padding:10px 18px;border-radius:999px;font-size:13px;z-index:80;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center;}
  .toast.show{opacity:1;}
  .toast.error{background:var(--danger);}
  .backup-note{font-size:11px;color:var(--ink-soft);margin-top:6px;line-height:1.6;}
  @media print{
    header, nav.tabs, aside.sidebar, .header-actions, .search-wrap{display:none !important;}
    body.printing-single > *:not(#printHost){display:none !important;}
    body.printing-single #printHost{display:block !important;padding:20px;}
  }
  #printHost{display:none;}
  @media (min-width:640px){.stat-grid{grid-template-columns:repeat(4,1fr) !important;}}
  #app > div.content{padding:20px;}
  @media (min-width:760px){#app > div.content{padding:28px;}}
  .org-wrap{text-align:center;padding:20px 10px 40px;}
  .org-hub{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--surface),var(--primary-light));
    border:2px solid var(--primary);border-radius:18px;padding:16px 30px;box-shadow:0 10px 26px rgba(0,0,0,.08);}
  .org-hub-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:19px;color:var(--primary-dark);}
  .org-stem{width:2px;height:26px;background:var(--border);margin:0 auto;}
  .org-connector{position:relative;height:26px;max-width:900px;margin:0 auto;}
  .org-connector-line{position:absolute;top:0;height:2px;background:var(--border);}
  .org-row{display:flex;justify-content:center;gap:16px;max-width:960px;margin:0 auto;flex-wrap:wrap;}
  .org-branch{flex:1;min-width:170px;max-width:220px;display:flex;flex-direction:column;align-items:center;}
  .org-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 14px;width:100%;
    cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.06);transition:box-shadow .15s,transform .15s;text-align:center;}
  .org-box:hover{box-shadow:0 12px 26px rgba(0,0,0,.12);transform:translateY(-2px);}
  .org-box .org-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    background:var(--primary-light);margin:0 auto 10px;}
  .org-box .org-name{font-family:'Cairo',sans-serif;font-weight:800;font-size:14px;color:var(--ink);margin-bottom:4px;}
  .org-box .org-count{font-size:11px;color:var(--ink-soft);}
  .org-add-branch{border:2px dashed var(--border);background:transparent;border-radius:16px;padding:16px 14px;
    width:100%;color:var(--ink-soft);font-size:13px;font-weight:700;min-height:110px;display:flex;align-items:center;justify-content:center;}
  .org-add-branch:hover{border-color:var(--primary);color:var(--primary);}
  .org-tagline{display:inline-flex;align-items:center;gap:12px;border:2px dashed var(--primary);border-radius:14px;
    padding:14px 26px;margin-top:36px;color:var(--primary-dark);font-weight:800;font-family:'Cairo',sans-serif;font-size:13px;background:var(--primary-light);}

  /* ===== Login screen ===== */
  #loginScreen{position:fixed;inset:0;background:linear-gradient(160deg,var(--primary-dark),#2c1211);display:flex;
    align-items:center;justify-content:center;padding:20px;z-index:100;}
  .login-card{background:var(--surface);border-radius:20px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.35);}
  .login-mark{width:56px;height:56px;border-radius:14px;background:var(--primary);display:flex;align-items:center;justify-content:center;
    font-family:'Cairo',sans-serif;font-weight:800;color:#fff;font-size:22px;margin:0 auto 14px;}
  .login-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:19px;text-align:center;margin-bottom:2px;}
  .login-sub{font-size:12px;color:var(--ink-soft);text-align:center;margin-bottom:22px;}
  .login-error{background:#FBEAEC;color:var(--danger);border:1px solid #F0C6CC;border-radius:8px;padding:8px 10px;font-size:12px;margin-bottom:12px;display:none;}

  /* ===== Loading overlay ===== */
  #appLoadingOverlay{position:fixed;inset:0;background:rgba(245,243,236,.85);display:none;align-items:center;
    justify-content:center;flex-direction:column;gap:12px;z-index:90;}
  .spinner{width:34px;height:34px;border-radius:50%;border:4px solid var(--border);border-top-color:var(--primary);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .db-status{font-size:11px;color:var(--ink-soft);display:flex;align-items:center;gap:5px;}
  .db-status .dot{width:7px;height:7px;border-radius:50%;background:var(--success);}
  .db-status.offline .dot{background:var(--danger);}
</style>
</head>
<body>

<!-- ============== LOGIN SCREEN ============== -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-mark">AJ</div>
    <div class="login-title">AL AJYAL — نظام الموظفين والإجازات</div>
    <div class="login-sub">سجّل الدخول بحساب الموارد البشرية للمتابعة</div>
    <div class="login-error" id="login-error"></div>
    <form id="login-form" onsubmit="handleLoginSubmit(event)">
      <div class="field"><label>البريد الإلكتروني</label><input id="login-email" type="email" required placeholder="name@company.com" autocomplete="username"></div>
      <div class="field"><label>كلمة المرور</label><input id="login-password" type="password" required placeholder="••••••••" autocomplete="current-password"></div>
      <button id="login-submit-btn" type="submit" class="btn btn-primary" style="width:100%;padding:11px;margin-top:6px;">تسجيل الدخول</button>
    </form>
    <div class="backup-note" style="text-align:center;margin-top:16px;">
      لا تملك حسابًا؟ اطلب من مسؤول النظام إضافتك من لوحة Supabase (Authentication → Users).
    </div>
  </div>
</div>

<!-- ============== LOADING OVERLAY ============== -->
<div id="appLoadingOverlay"><div class="spinner"></div><div style="font-size:13px;color:var(--ink-soft);">جاري تحميل البيانات من قاعدة البيانات...</div></div>

<!-- ============== MAIN APP ============== -->
<div id="mainApp" style="display:none;">
<header class="app-header">
  <div class="brand">
    <div class="brand-mark">AJ</div>
    <div>
      <div class="brand-name" style="letter-spacing:1px;">AL AJYAL</div>
      <div class="brand-sub" id="empCount">0 موظف</div>
    </div>
  </div>
  <div class="header-actions">
    <span class="db-status" id="dbStatus"><span class="dot"></span><span>متصل بقاعدة البيانات</span></span>
    <button class="btn btn-outline btn-sm" onclick="downloadBackup()">⭳ نسخة احتياطية</button>
    <label class="btn btn-outline btn-sm" style="display:inline-block;">
      استيراد <input type="file" accept="application/json" style="display:none" onchange="restoreBackup(event)">
    </label>
    <button class="btn btn-white" onclick="openEmployeeModal()">+ موظف جديد</button>
    <span class="user-chip" id="userEmailLabel">—</span>
    <button class="btn btn-outline btn-sm" onclick="signOut()">خروج</button>
  </div>
</header>

<nav class="tabs">
  <button id="tab-home" onclick="setPage('home')">الرئيسية</button>
  <button id="tab-leaves" onclick="setPage('leaves')">الإجازات</button>
  <button id="tab-reports" onclick="setPage('reports')">التقارير</button>
  <button id="tab-org" onclick="setPage('org')">الهيكل التنظيمي</button>
</nav>
<div id="app"></div>
</div>
<div id="printHost"></div>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================================
   SUPABASE CLIENT
   ========================================================================== */
const supabaseUrl = 'https://mpsjrdnfiirecujomubg.supabase.co';
const supabaseKey = 'sb_publishable_GJsre-A1-S1jeudNpLDDQA_niejdMZa';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

/* ============================================================================
   CONSTANTS
   ========================================================================== */
const LEAVE_TYPES = {
  annual:    { label: "سنوية", color: "#146356", light: "#E4EFEC" },
  sick:      { label: "مرضية", color: "#3B5B7A", light: "#E7EDF2" },
  emergency: { label: "طارئة", color: "#C98A2C", light: "#FAF0DF" },
};

/* ============================================================================
   STATE (in-memory cache of what's in Supabase — refreshed after every write)
   ========================================================================== */
let currentSession = null;
let employees = [];
let departments = [];
let page = "home";
let selectedId = null;
let leaveSelectedId = null;
let leaveDraft = null;
let homeSearch = "";
let leaveSearch = "";
let reportSearch = "";
let reportEmpId = null;

/* ============================================================================
   AUTH
   ========================================================================== */
function handleSession(session){
  currentSession = session;
  if (session) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    document.getElementById("userEmailLabel").textContent = session.user.email || "مستخدم";
    loadAll();
  } else {
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("mainApp").style.display = "none";
  }
}
async function handleLoginSubmit(evt){
  evt.preventDefault();
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const btn = document.getElementById("login-submit-btn");
  const errEl = document.getElementById("login-error");
  errEl.style.display = "none";
  btn.disabled = true; btn.textContent = "جاري الدخول...";
  const { error } = await _supabase.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = "تسجيل الدخول";
  if (error) {
    errEl.textContent = "تعذّر تسجيل الدخول: تحقق من البريد الإلكتروني وكلمة المرور.";
    errEl.style.display = "block";
  }
}
async function signOut(){
  await _supabase.auth.signOut();
}
_supabase.auth.onAuthStateChange((_event, session) => handleSession(session));
_supabase.auth.getSession().then(({ data }) => handleSession(data.session));

/* ============================================================================
   DATA LAYER — Supabase reads
   ========================================================================== */
function setAppLoading(loading){
  document.getElementById("appLoadingOverlay").style.display = loading ? "flex" : "none";
}
function setDbStatus(ok){
  const el = document.getElementById("dbStatus");
  if (!el) return;
  el.classList.toggle("offline", !ok);
  el.querySelector("span:last-child").textContent = ok ? "متصل بقاعدة البيانات" : "تعذّر الاتصال بقاعدة البيانات";
}

async function loadAll(){
  setAppLoading(true);
  await loadDepartments();
  await loadEmployees();
  setAppLoading(false);
  setPage(page);
}

async function loadDepartments(){
  const { data, error } = await _supabase.from("departments").select("*").order("created_at", { ascending: true });
  if (error) { showToast("تعذّر تحميل الأقسام: " + error.message, true); setDbStatus(false); departments = []; return; }
  setDbStatus(true);
  departments = (data || []).map(d => ({ id: d.id, name: d.name, manager: d.manager || "", parentId: d.parent_id }));
}

function rowToEmployee(row, records){
  const dept = departments.find(d => d.id === row.department_id);
  return {
    id: row.id,
    employeeNumber: row.employee_number || "",
    name: row.name,
    dob: row.dob || "",
    age: row.age,
    experience: row.experience,
    joinDate: row.join_date || "",
    phone: row.phone || "",
    departmentId: row.department_id || null,
    department: dept ? dept.name : "",
    notes: row.notes || "",
    leaves: {
      annual:    { balance: Number(row.annual_balance) || 0,    taken: Number(row.annual_taken) || 0 },
      sick:      { balance: Number(row.sick_balance) || 0,      taken: Number(row.sick_taken) || 0 },
      emergency: { balance: Number(row.emergency_balance) || 0, taken: Number(row.emergency_taken) || 0 },
    },
    records: records || [],
  };
}

async function loadEmployees(){
  const [{ data: empRows, error: empErr }, { data: recRows, error: recErr }] = await Promise.all([
    _supabase.from("employees").select("*").order("name", { ascending: true }),
    _supabase.from("leave_records").select("*").order("start_date", { ascending: false }),
  ]);
  if (empErr) { showToast("تعذّر تحميل الموظفين: " + empErr.message, true); setDbStatus(false); employees = []; return; }
  if (recErr) { showToast("تعذّر تحميل سجلات الإجازات: " + recErr.message, true); }
  setDbStatus(true);
  const recordsByEmp = {};
  (recRows || []).forEach(r => {
    const rec = { id: r.id, type: r.type, startDate: r.start_date, endDate: r.end_date, days: Number(r.days), notes: r.notes || "" };
    (recordsByEmp[r.employee_id] = recordsByEmp[r.employee_id] || []).push(rec);
  });
  employees = (empRows || []).map(row => rowToEmployee(row, recordsByEmp[row.id]));
}

/* ============================================================================
   HELPERS
   ========================================================================== */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
const MONTHS_AR = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
function fmtDate(d){
  if(!d) return "—";
  const date = new Date(d + "T00:00:00");
  if (isNaN(date)) return "—";
  return date.getDate() + " " + MONTHS_AR[date.getMonth()] + " " + date.getFullYear();
}
function remaining(t){ return Math.round((t.balance - t.taken) * 100) / 100; }
function daysBetween(start,end){
  if(!start||!end) return 0;
  const s=new Date(start), e=new Date(end);
  const diff = Math.round((e-s)/(1000*60*60*24)) + 1;
  return diff>0?diff:0;
}
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function showToast(msg, isError){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.toggle("error", !!isError);
  t.classList.add("show");
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove("show"), isError ? 3600 : 2200);
}
function deptLabel(d){
  if (!d.parentId) return d.name;
  const parent = departments.find(p => p.id === d.parentId);
  return parent ? (parent.name + " › " + d.name) : d.name;
}

/* ============================================================================
   MONTHLY GROUPING & CHARTS
   ========================================================================== */
function monthKey(dateStr){
  const d = new Date(dateStr + "T00:00:00");
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
}
function monthLabel(key){
  const [y,m] = key.split("-");
  return MONTHS_AR[parseInt(m,10)-1] + " " + y;
}
function groupRecordsByMonth(records){
  const map = {};
  records.forEach(r=>{
    const key = monthKey(r.startDate);
    if(!map[key]) map[key] = [];
    map[key].push(r);
  });
  return Object.keys(map).sort().reverse().map(k=>({
    key: k, label: monthLabel(k),
    records: map[k].sort((a,b)=> new Date(b.startDate) - new Date(a.startDate)),
    total: map[k].reduce((s,r)=>s+r.days,0),
  }));
}
function aggregateMonthly(records){
  const map = {};
  records.forEach(r=>{
    const key = monthKey(r.startDate);
    if(!map[key]) map[key] = { annual:0, sick:0, emergency:0, total:0 };
    map[key][r.type] = (map[key][r.type]||0) + r.days;
    map[key].total += r.days;
  });
  return Object.keys(map).sort().map(k=>({ key:k, label: monthLabel(k), ...map[k] }));
}
function renderGroupedRecords(records, editable){
  if(!records || records.length===0){
    return `<div style="color:var(--ink-soft);border:1px dashed var(--border);border-radius:12px;text-align:center;padding:24px;font-size:13px;">لا توجد أيام إجازة مسجّلة بتواريخ محددة بعد.</div>`;
  }
  const groups = groupRecordsByMonth(records);
  return groups.map(g => `
    <div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;background:var(--primary-light);color:var(--primary-dark);border-radius:8px;padding:8px 12px;font-weight:800;font-size:13px;margin-bottom:6px;">
        <span>${g.label}</span><span>${g.total} يوم</span>
      </div>
      <div class="table-wrap">
        <table class="datatable">
          <thead><tr><th>النوع</th><th>من</th><th>إلى</th><th>الأيام</th><th>ملاحظات</th>${editable?'<th>إجراءات</th>':''}</tr></thead>
          <tbody>${g.records.map(r=>{
            const t = LEAVE_TYPES[r.type] || LEAVE_TYPES.annual;
            return `<tr>
              <td><span class="badge" style="background:${t.light};color:${t.color};">${t.label}</span></td>
              <td style="color:var(--ink-soft);">${fmtDate(r.startDate)}</td>
              <td style="color:var(--ink-soft);">${fmtDate(r.endDate)}</td>
              <td><strong>${r.days}</strong></td>

              ${editable ? `<td>
                <button class="icon-btn" onclick='openRecordModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>✎</button>
                <button class="icon-btn danger" onclick="openConfirmModal('سيتم حذف يوم الإجازة هذا نهائيًا. هل أنت متأكد؟', () => deleteRecord('${r.id}'))">🗑</button>
              </td>` : ''}
            </tr>`;
          }).join("")}</tbody>
        </table>
      </div>
    </div>`).join("");
}
function svgMonthlyChart(months){
  if(!months || months.length===0){
    return `<div style="color:var(--ink-soft);text-align:center;padding:30px 10px;font-size:13px;border:1px dashed var(--border);border-radius:12px;">لا توجد بيانات كافية بعد لعرض الرسم البياني (أضف أيام إجازة بتواريخ محددة).</div>`;
  }
  const w = 680, h = 240, padL = 8, padR = 8, padB = 40, padT = 26;
  const chartW = w - padL - padR;
  const chartH = h - padT - padB;
  const maxVal = Math.max(...months.map(m=>m.total), 1);
  const gap = chartW / months.length;
  const barW = Math.min(gap * 0.55, 46);
  const colors = { annual:"#8D3532", sick:"#3B5B7A", emergency:"#C98A2C" };
  let bars = "";
  months.forEach((m,i)=>{
    const x = padL + i*gap + (gap-barW)/2;
    let yCursor = h - padB;
    ["annual","sick","emergency"].forEach(type=>{
      const val = m[type] || 0;
      if(val<=0) return;
      const segH = (val/maxVal) * chartH;
      yCursor -= segH;
      bars += `<rect x="${x.toFixed(1)}" y="${yCursor.toFixed(1)}" width="${barW.toFixed(1)}" height="${segH.toFixed(1)}" fill="${colors[type]}" rx="2"/>`;
    });
    bars += `<text x="${(x+barW/2).toFixed(1)}" y="${(yCursor-6).toFixed(1)}" font-size="11" fill="#1E2A2C" text-anchor="middle" font-weight="700">${m.total}</text>`;
    bars += `<text x="${(x+barW/2).toFixed(1)}" y="${h-padB+16}" font-size="10" fill="#657072" text-anchor="middle">${m.label}</text>`;
  });
  bars += `<line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="#E6DEDD" stroke-width="1"/>`;
  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;max-height:260px;display:block;">${bars}</svg>
    <div style="display:flex;gap:16px;justify-content:center;margin-top:6px;font-size:12px;color:var(--ink-soft);flex-wrap:wrap;">
      <span><span style="display:inline-block;width:10px;height:10px;background:${colors.annual};border-radius:2px;margin-left:4px;"></span>سنوية</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:${colors.sick};border-radius:2px;margin-left:4px;"></span>مرضية</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:${colors.emergency};border-radius:2px;margin-left:4px;"></span>طارئة</span>
    </div>`;
}

/* ============================================================================
   BACKUP / RESTORE — now backed by Supabase, not localStorage
   ========================================================================== */
async function downloadBackup(){
  showToast("جاري تجهيز النسخة الاحتياطية...");
  const [{ data: emps, error: e1 }, { data: depts, error: e2 }, { data: recs, error: e3 }] = await Promise.all([
    _supabase.from("employees").select("*"),
    _supabase.from("departments").select("*"),
    _supabase.from("leave_records").select("*"),
  ]);
  if (e1 || e2 || e3) { showToast("فشل تجهيز النسخة الاحتياطية", true); return; }
  const payload = { exportedAt: new Date().toISOString(), departments: depts, employees: emps, leave_records: recs };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "aos-backup-" + new Date().toISOString().slice(0,10) + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast("تم تنزيل نسخة احتياطية كاملة من قاعدة البيانات");
}
function restoreBackup(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let data;
    try { data = JSON.parse(reader.result); }
    catch(e){ showToast("ملف غير صالح", true); evt.target.value=""; return; }
    if (!data.employees) { showToast("صيغة النسخة الاحتياطية غير معروفة", true); evt.target.value=""; return; }
    openConfirmModal("سيتم دمج/استبدال البيانات الحالية بمحتوى هذا الملف داخل قاعدة البيانات. هل أنت متأكد؟", async () => {
      closeModal();
      setAppLoading(true);
      try {
        if (data.departments && data.departments.length) await _supabase.from("departments").upsert(data.departments, { onConflict: "id" });
        if (data.employees && data.employees.length) await _supabase.from("employees").upsert(data.employees, { onConflict: "id" });
        if (data.leave_records && data.leave_records.length) await _supabase.from("leave_records").upsert(data.leave_records, { onConflict: "id" });
        await loadAll();
        showToast("تـم استيراد البيانات إلى قاعدة البيانات بنجاح");
      } catch(err){ showToast("فشل الاستيراد: " + err.message, true); }
      finally { setAppLoading(false); }
    });
  };
  reader.readAsText(file);
  evt.target.value = "";
}

/* ============================================================================
   EMPLOYEE CRUD (Supabase)
   ========================================================================== */
async function saveEmployee(data){
  const payload = {
    employee_number: data.employeeNumber || null,
    name: data.name,
    dob: data.dob || null,
    age: data.age === "" || data.age == null ? null : data.age,
    experience: data.experience === "" || data.experience == null ? null : data.experience,
    join_date: data.joinDate || null,
    phone: data.phone || null,
    department_id: data.departmentId || null,
    notes: data.notes || null,
  };
  let error, newId = null;
  if (data.id) {
    ({ error } = await _supabase.from("employees").update(payload).eq("id", data.id));
  } else {
    payload.annual_balance = 0; payload.annual_taken = 0;
    payload.sick_balance = 12; payload.sick_taken = 0;
    payload.emergency_balance = 12; payload.emergency_taken = 0;
    const { data: inserted, error: insErr } = await _supabase.from("employees").insert(payload).select().single();
    error = insErr;
    if (inserted) newId = inserted.id;
  }
  if (error) { showToast("فشل الحفظ: " + error.message, true); return; }
  closeModal();
  await loadEmployees();
  if (newId) selectedId = newId;
  renderApp();
  showToast("تم حفظ بيانات الموظف بنجاح");
}
async function deleteEmployee(id){
  const { error } = await _supabase.from("employees").delete().eq("id", id);
  if (error) { showToast("فشل الحذف: " + error.message, true); return; }
  if (selectedId===id) selectedId=null;
  if (leaveSelectedId===id){ leaveSelectedId=null; leaveDraft=null; }
  closeModal();
  await loadEmployees();
  renderApp();
  showToast("تم حذف الموظف وكل سجلات إجازاته");
}

/* ============================================================================
   LEAVE BALANCE / RECORDS (Supabase)
   ========================================================================== */
function selectLeaveEmployee(id){
  leaveSelectedId = id;
  const emp = employees.find(e=>e.id===id);
  leaveDraft = emp ? JSON.parse(JSON.stringify(emp.leaves)) : null;
  renderApp();
}
function updateDraftField(type, field, value){
  if(!leaveDraft) return;
  leaveDraft[type][field] = parseFloat(value) || 0;
  const rem = remaining(leaveDraft[type]);
  const el = document.getElementById("rem-" + type);
  if(el) el.value = rem;
}
function updateDraftRemaining(type, value){
  if(!leaveDraft) return;
  const rem = parseFloat(value) || 0;
  leaveDraft[type].taken = Math.round((leaveDraft[type].balance - rem) * 100) / 100;
  const el = document.getElementById("taken-" + type);
  if(el) el.value = leaveDraft[type].taken;
}
async function saveLeaveDraft(){
  if(!leaveSelectedId || !leaveDraft) return;
  const payload = {
    annual_balance: leaveDraft.annual.balance, annual_taken: leaveDraft.annual.taken,
    sick_balance: leaveDraft.sick.balance, sick_taken: leaveDraft.sick.taken,
    emergency_balance: leaveDraft.emergency.balance, emergency_taken: leaveDraft.emergency.taken,
  };
  const { error } = await _supabase.from("employees").update(payload).eq("id", leaveSelectedId);
  if (error) { showToast("فشل حفظ الرصيد: " + error.message, true); return; }
  await loadEmployees();
  showToast("تم حفظ رصيد الإجازات");
  renderApp();
}
async function saveRecord(data){
  const days = daysBetween(data.startDate, data.endDate);
  if(!data.startDate || !data.endDate || days<=0){ showToast("تحقق من التواريخ المدخلة", true); return; }
  const emp = employees.find(e=>e.id===leaveSelectedId);
  if(!emp) return;
  const oldRec = data.id ? (emp.records||[]).find(r=>r.id===data.id) : null;

  let error;
  if (data.id) {
    ({ error } = await _supabase.from("leave_records").update({
      type: data.type, start_date: data.startDate, end_date: data.endDate, days, notes: data.notes || null
    }).eq("id", data.id));
  } else {
    ({ error } = await _supabase.from("leave_records").insert({
      employee_id: leaveSelectedId, type: data.type, start_date: data.startDate, end_date: data.endDate, days, notes: data.notes || null
    }));
  }
  if (error) { showToast("فشل حفظ يوم الإجازة: " + error.message, true); return; }

  // Adjust "المستخدم" بالفرق — يدعم أيضًا الأيام اليدوية القديمة بدون تواريخ محددة
  const leaves = JSON.parse(JSON.stringify(emp.leaves));
  if (oldRec) leaves[oldRec.type].taken = Math.round((leaves[oldRec.type].taken - oldRec.days) * 100) / 100;
  leaves[data.type].taken = Math.round((leaves[data.type].taken + days) * 100) / 100;

  const { error: updErr } = await _supabase.from("employees").update({
    annual_taken: leaves.annual.taken, sick_taken: leaves.sick.taken, emergency_taken: leaves.emergency.taken
  }).eq("id", leaveSelectedId);
  if (updErr) showToast("فشل تحديث الرصيد: " + updErr.message, true);

  await loadEmployees();
  const updated = employees.find(e=>e.id===leaveSelectedId);
  if (updated) leaveDraft = JSON.parse(JSON.stringify(updated.leaves));
  closeModal();
  showToast("تم إضافة الإجازة وخصمها من الرصيد تلقائيًا");
  renderApp();
}
async function deleteRecord(id){
  const emp = employees.find(e=>e.id===leaveSelectedId);
  const rec = emp && (emp.records||[]).find(r=>r.id===id);
  const { error } = await _supabase.from("leave_records").delete().eq("id", id);
  if (error) { showToast("فشل الحذف: " + error.message, true); return; }
  if (rec && emp) {
    const leaves = JSON.parse(JSON.stringify(emp.leaves));
    leaves[rec.type].taken = Math.max(0, Math.round((leaves[rec.type].taken - rec.days) * 100) / 100);
    const { error: updErr } = await _supabase.from("employees").update({
      annual_taken: leaves.annual.taken, sick_taken: leaves.sick.taken, emergency_taken: leaves.emergency.taken
    }).eq("id", leaveSelectedId);
    if (updErr) showToast("فشل تحديث الرصيد: " + updErr.message, true);
  }
  await loadEmployees();
  const updated = employees.find(e=>e.id===leaveSelectedId);
  if (updated) leaveDraft = JSON.parse(JSON.stringify(updated.leaves));
  closeModal();
  showToast("تم حذف يوم الإجازة وإرجاعه إلى الرصيد");
  renderApp();
}

        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
      <div id="leaveEmpListContainer">${renderLeaveEmpListHTML(filtered, leaveSelected)}</div>
    </aside>
    <main class="content">
      ${leaveSelected && leaveDraft ? renderLeaveDetail(leaveSelected) : `<div class="empty-state" style="padding:24px 0 40px;">اختر موظفًا من القائمة لعرض وتعديل رصيد إجازاته.</div>`}
      <div class="section-title">جدول الإجازات لجميع الموظفين</div>
      <div class="table-wrap">
        <table class="datatable">
          <thead><tr><th>الموظف</th><th>تاريخ الالتحاق</th><th>سنوية (رصيد/مستخدم/متبقي)</th><th>مرضية (رصيد/مستخدم/متبقي)</th><th>طارئة (رصيد/مستخدم/متبقي)</th></tr></thead>
          <tbody>
            ${employees.map(emp => `
              <tr style="cursor:pointer;" onclick="selectLeaveEmployee('${emp.id}');">
                <td><strong>${esc(emp.name)}</strong> <span style="color:var(--ink-soft);">#${esc(emp.employeeNumber)}</span></td>
                <td style="color:var(--ink-soft);">${fmtDate(emp.joinDate)}</td>

                  return `<td><span style="color:${t.color};font-weight:700;">${l.balance}</span><span style="color:var(--ink-soft);"> / ${l.taken} / </span><span style="font-weight:700;">${remaining(l)}</span></td>`;

function renderLeaveEmpListHTML(list, selected){
  if(list.length===0) return `<div style="color:var(--ink-soft);font-size:13px;text-align:center;padding:24px 0;">لا يوجد موظفون.</div>`;
  return list.map(emp => `
    <button class="emp-row ${selected && selected.id===emp.id ? 'selected':''}" onclick="selectLeaveEmployee('${emp.id}');">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="emp-avatar">${esc(emp.name[0]||'؟')}</div>
        <div><div class="emp-name">${esc(emp.name)}</div><div class="emp-sub">#${esc(emp.employeeNumber)}</div></div>
      </div>
    </button>`).join("");
}
function renderLeaveEmpList(){
  const filtered = employees.filter(e => !leaveSearch.trim() ||
    e.name.includes(leaveSearch) || (e.employeeNumber||"").includes(leaveSearch));
  const leaveSelected = employees.find(e=>e.id===leaveSelectedId) || null;
  document.getElementById("leaveEmpListContainer").innerHTML = renderLeaveEmpListHTML(filtered, leaveSelected);
}
function renderLeaveDetail(emp){
  const cards = Object.keys(LEAVE_TYPES).map(key=>{
    const t = LEAVE_TYPES[key]; const d = leaveDraft[key];
    return `<div class="leave-card" style="border-top-color:${t.color}">
      <div class="lt-title" style="color:${t.color}">إجازة ${t.label}</div>
      <div class="lt-inputs">
        <div><label>الرصيد</label><input id="bal-${key}" type="number" step="0.25" value="${d.balance}" oninput="updateDraftField('${key}','balance',this.value)"></div>
        <div><label>المستخدم</label><input id="taken-${key}" type="number" step="0.25" value="${d.taken}" oninput="updateDraftField('${key}','taken',this.value)"></div>
      </div>
      <div class="rem-pill" style="background:${t.light};color:${t.color};">
        <span>المتبقي</span>
        <input id="rem-${key}" type="number" step="0.25" value="${remaining(d)}" oninput="updateDraftRemaining('${key}',this.value)"
          style="width:70px;text-align:center;border:1px solid ${t.color};border-radius:6px;padding:3px 4px;background:#fff;color:${t.color};font-weight:800;font-family:'Tajawal',sans-serif;">
      </div>

  const records = emp.records || [];

  const chartHTML = svgMonthlyChart(aggregateMonthly(records));

  return `
  <div style="margin-bottom:28px;">
    <div class="section-title">رصيد إجازات: ${esc(emp.name)}</div>
    <div class="leave-cards" style="margin-bottom:8px;">${cards}</div>
    <div class="backup-note" style="margin-bottom:10px;">"المستخدم" يتحدّث تلقائيًا كل ما تضيف/تحذف يوم إجازة بالأسفل. تقدر أيضًا تعدّله يدويًا من هنا لو عندك أيام قديمة بدون تواريخ محددة — بعدين اضغط "حفظ التعديلات".</div>
    <button class="btn btn-primary" onclick="saveLeaveDraft()">💾 حفظ التعديلات</button>

    <div class="section-title" style="margin:24px 0 12px;">الاتجاه الشهري لإجازات ${esc(emp.name)}</div>

      <button class="btn btn-primary btn-sm" onclick="openRecordModal()">+ إضافة يوم إجازة</button>
    </div>
    ${recordsHTML}

}

function renderReports(){
  const n = employees.length;
  const avg = (arr) => arr.length ? Math.round((arr.reduce((a,b)=>a+b,0)/arr.length)*10)/10 : 0;
  const avgAge = avg(employees.map(e=>e.age||0).filter(Boolean));
  const avgExp = avg(employees.map(e=>e.experience||0));

  const typeTotals = {};
  Object.keys(LEAVE_TYPES).forEach(key=>{
    let balance=0, taken=0;
    employees.forEach(e=>{ balance += e.leaves[key].balance; taken += e.leaves[key].taken; });
    typeTotals[key] = { balance: Math.round(balance*100)/100, taken: Math.round(taken*100)/100, remaining: Math.round((balance-taken)*100)/100 };
  });

  const totalRecordedDays = employees.reduce((sum,e)=> sum + (e.records||[]).reduce((s,r)=>s+r.days,0), 0);

  const ranked = [...employees].sort((a,b)=>{
    const ta = Object.keys(LEAVE_TYPES).reduce((s,k)=>s+a.leaves[k].taken,0);
    const tb = Object.keys(LEAVE_TYPES).reduce((s,k)=>s+b.leaves[k].taken,0);
    return tb-ta;
  }).slice(0,8);

  const alerts = [];
  employees.forEach(e=>{
    Object.keys(LEAVE_TYPES).forEach(key=>{
      const rem = remaining(e.leaves[key]);
      if(rem < 0) alerts.push({ emp: e, type: key, rem });
    });
  });

  const statCard = (label, value) => `
    <div class="card" style="padding:16px;text-align:center;">
      <div style="font-size:12px;color:var(--ink-soft);margin-bottom:6px;">${label}</div>
      <div style="font-family:'Cairo',sans-serif;font-weight:800;font-size:24px;color:var(--primary);">${value}</div>
    </div>`;

  const typeCards = Object.keys(LEAVE_TYPES).map(key=>{
    const t = LEAVE_TYPES[key]; const s = typeTotals[key];
    return `<div class="leave-card" style="border-top-color:${t.color}">
      <div class="lt-title" style="color:${t.color}">إجازة ${t.label} (كل الموظفين)</div>
      <div style="font-size:12px;color:var(--ink-soft);margin-bottom:8px;">إجمالي الرصيد: ${s.balance} · إجمالي المستخدم: ${s.taken}</div>
      <div class="rem-pill" style="background:${t.light};color:${t.color};"><span>إجمالي المتبقي</span><span>${s.remaining}</span></div>
    </div>`;
  }).join("");

  const rankedRows = ranked.map((e,i)=>{
    const total = Object.keys(LEAVE_TYPES).reduce((s,k)=>s+e.leaves[k].taken,0);
    return `<tr>
      <td>${i+1}</td>
      <td><strong>${esc(e.name)}</strong> <span style="color:var(--ink-soft);">#${esc(e.employeeNumber)}</span></td>
      <td>${e.leaves.annual.taken}</td>
      <td>${e.leaves.sick.taken}</td>
      <td>${e.leaves.emergency.taken}</td>
      <td><strong>${total}</strong></td>
    </tr>`;
  }).join("");

  const alertsHTML = alerts.length===0 ? "" : `
    <div class="card" style="border-right:4px solid var(--danger);">
      <div class="section-title" style="margin-bottom:10px;">⚠ تنبيهات: رصيد إجازة سالب</div>
      ${alerts.map(a=>`<div style="font-size:13px;padding:6px 0;border-top:1px dashed var(--border);">
        <strong>${esc(a.emp.name)}</strong> — إجازة ${LEAVE_TYPES[a.type].label}: المتبقي <strong style="color:var(--danger);">${a.rem}</strong>
      </div>`).join("")}
    </div>`;

  const q = reportSearch.trim();
  const fullList = employees.filter(e => !q || e.name.includes(q) || (e.employeeNumber||"").includes(q) || (e.department||"").includes(q));
  const fullRows = fullList.map(e=>`
    <tr>
      <td><strong>${esc(e.name)}</strong></td>
      <td>#${esc(e.employeeNumber)}</td>
      <td>${esc(e.department)||"—"}</td>
      <td>${e.age||"—"}</td>
      <td>${e.experience!=null?e.experience:"—"}</td>
      <td>${fmtDate(e.joinDate)}</td>
      <td>${esc(e.phone)||"—"}</td>
      <td>${e.leaves.annual.balance} / ${e.leaves.annual.taken} / <strong>${remaining(e.leaves.annual)}</strong></td>
      <td>${e.leaves.sick.balance} / ${e.leaves.sick.taken} / <strong>${remaining(e.leaves.sick)}</strong></td>
      <td>${e.leaves.emergency.balance} / ${e.leaves.emergency.taken} / <strong>${remaining(e.leaves.emergency)}</strong></td>
    </tr>`).join("");

  const allRecords = [];
  employees.forEach(e => (e.records||[]).forEach(r => allRecords.push({...r, empName: e.name, empNumber: e.employeeNumber})));
  allRecords.sort((a,b)=> new Date(b.startDate) - new Date(a.startDate));
  const recordsLogHTML = allRecords.length===0 ? `

      <table class="datatable">

        <tbody>${allRecords.map(r=>{
          const t = LEAVE_TYPES[r.type]||LEAVE_TYPES.annual;
          return `<tr>
            <td><strong>${esc(r.empName)}</strong> <span style="color:var(--ink-soft);">#${esc(r.empNumber)}</span></td>
            <td><span class="badge" style="background:${t.light};color:${t.color};">${t.label}</span></td>
            <td style="color:var(--ink-soft);">${fmtDate(r.startDate)}</td>
            <td style="color:var(--ink-soft);">${fmtDate(r.endDate)}</td>
            <td><strong>${r.days}</strong></td>
            <td style="color:var(--ink-soft);">${esc(r.notes)||"—"}</td>
          </tr>`;
        }).join("")}</tbody>
      </table>
    </div>`;

  const companyChartHTML = svgMonthlyChart(aggregateMonthly(allRecords));

  const empOptions = employees.map(e=>`<option value="${e.id}" ${reportEmpId===e.id?'selected':''}>${esc(e.name)} (#${esc(e.employeeNumber)})</option>`).join("");
  const reportEmp = employees.find(e=>e.id===reportEmpId) || null;
  let employeeReportHTML = `<div style="color:var(--ink-soft);border:1px dashed var(--border);border-radius:12px;text-align:center;padding:24px;font-size:13px;">اختر موظفًا من القائمة أعلاه لعرض تقريره الكامل.</div>`;
  if(reportEmp){
    const empChart = svgMonthlyChart(aggregateMonthly(reportEmp.records||[]));
    const empLeaveCards = Object.keys(LEAVE_TYPES).map(key=>{
      const t = LEAVE_TYPES[key]; const l = reportEmp.leaves[key];
      return `<div class="leave-card" style="border-top-color:${t.color}">
        <div class="lt-title" style="color:${t.color}">إجازة ${t.label}</div>
        <div style="font-size:12px;color:var(--ink-soft);">الرصيد: ${l.balance} · المستخدم: ${l.taken}</div>
        <div class="rem-pill" style="background:${t.light};color:${t.color};margin-top:8px;"><span>المتبقي</span><span>${remaining(l)}</span></div>
      </div>`;
    }).join("");
    const totalTaken = Object.keys(LEAVE_TYPES).reduce((s,k)=>s+reportEmp.leaves[k].taken,0);
    employeeReportHTML = `
      <div class="card">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between;">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="background:var(--primary);width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Cairo',sans-serif;font-weight:800;font-size:20px;">${esc(reportEmp.name[0]||'؟')}</div>
            <div>
              <div style="font-family:'Cairo',sans-serif;font-weight:800;font-size:18px;">${esc(reportEmp.name)}</div>
              <div style="color:var(--ink-soft);font-size:12px;">#${esc(reportEmp.employeeNumber)} ${reportEmp.department?('· '+esc(reportEmp.department)):''}</div>
            </div>
          </div>
          <div style="text-align:center;">
            <div style="font-family:'Cairo',sans-serif;font-weight:800;font-size:22px;color:var(--primary);">${totalTaken}</div>
            <div style="font-size:11px;color:var(--ink-soft);">إجمالي الأيام المستخدمة (كل الأنواع)</div>
          </div>
        </div>
        <div class="info-grid">
          <div class="info-field"><div class="info-label">العمر</div><div class="info-value">${reportEmp.age?reportEmp.age+' سنة':'—'}</div></div>
          <div class="info-field"><div class="info-label">الخبرة</div><div class="info-value">${reportEmp.experience!=null?reportEmp.experience+' سنة':'—'}</div></div>
          <div class="info-field"><div class="info-label">تاريخ الالتحاق</div><div class="info-value">${fmtDate(reportEmp.joinDate)}</div></div>
          <div class="info-field"><div class="info-label">الهاتف</div><div class="info-value">${esc(reportEmp.phone)||'—'}</div></div>
        </div>
      </div>
      <div class="leave-cards" style="margin-bottom:20px;">${empLeaveCards}</div>
      <div class="section-title">الاتجاه الشهري لإجازات هذا الموظف</div>
      <div class="card" style="margin-bottom:20px;">${empChart}</div>
      <div class="section-title">تفاصيل الأيام المأخوذة (مقسّمة شهريًا)</div>
      ${renderGroupedRecords(reportEmp.records||[], false)}
    `;
  }

  return `
  <div class="content" style="padding:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;">

        <input placeholder="ابحث بالاسم أو الرقم..." value="${esc(reportSearch)}" oninput="reportSearch=this.value; renderApp();">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
    </div>
    <div class="table-wrap" style="margin-bottom:24px;">
      <table class="datatable">

const DEPT_ICONS = {

function pickDeptIcon(name){
  const n = (name||"").toLowerCase();
  if(/مال|finance/.test(n)) return DEPT_ICONS.finance;
  if(/موارد|بشري|hr|human/.test(n)) return DEPT_ICONS.hr;
  if(/لوجست|logistic/.test(n)) return DEPT_ICONS.logistics;
  if(/procurement|مشتريات|purchas/.test(n)) return DEPT_ICONS.procurement;
  if(/operation|تشغيل/.test(n)) return DEPT_ICONS.operation;
  if(/business|أعمال|اعمال|مبيعات/.test(n)) return DEPT_ICONS.business;
  return DEPT_ICONS.default;
}
function renderDeptNode(dep, withStem){
  const count = employees.filter(e=>e.departmentId===dep.id).length;
  const children = departments.filter(d=>d.parentId===dep.id);
  const leftPct = children.length>0 ? (50/children.length) : 0;
  return `
  <div class="org-branch">
    ${withStem ? '<div class="org-stem"></div>' : ''}
    <div class="org-box" onclick="openDepartmentModal('${dep.id}')">
      <div class="org-icon">${pickDeptIcon(dep.name)}</div>
      <div class="org-name">${esc(dep.name)}</div>
      ${dep.manager ? `<div style="font-size:12px;color:var(--primary);font-weight:700;margin-top:2px;">${esc(dep.manager)}</div>` : ""}
      <div class="org-count">${count} employee${count===1?"":"s"}</div>
    </div>
    ${children.length>0 ? `
      <div class="org-stem"></div>
      <div class="org-connector"><div class="org-connector-line" style="left:${leftPct}%;right:${leftPct}%;"></div></div>
      <div class="org-row">${children.map(c=>renderDeptNode(c, true)).join("")}</div>
    ` : ""}
  </div>`;
}
function renderOrgChart(){
  const roots = departments.filter(d=>!d.parentId);
  const branches = roots.map(dep=>renderDeptNode(dep, false)).join("");

  return `
  <div class="content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
      <div class="section-title" style="margin:0;">Organization Chart</div>
      <button class="btn btn-outline btn-sm" onclick="addDepartment(null)">+ Add Department</button>
    </div>
    <div class="backup-note" style="margin-bottom:10px;">Click any department to view its employees, add a sub-department under it, or add an employee directly.</div>

    <div class="org-wrap">
      <div class="org-row">
        ${branches}
        <div class="org-branch">
          <button class="org-add-branch" onclick="addDepartment(null)">+ New Department</button>
        </div>
      </div>
      <div class="org-tagline">🛡 Working together for a stronger and smarter future</div>
    </div>
  </div>`;
}
function addDepartment(parentId){
  const parent = parentId ? departments.find(d=>d.id===parentId) : null;
  document.getElementById("modalRoot").innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closeModal();">
    <div class="modal-box">
      <div class="modal-head"><h3>${parent ? "Add Sub-department under " + esc(parent.name) : "Add Department"}</h3><button onclick="closeModal()">✕</button></div>
      <div class="field"><label>Department name</label><input id="dept-name-input" placeholder="e.g. Marketing"></div>
      <div class="field"><label>Manager / Responsible (optional)</label><input id="dept-manager-input" placeholder="e.g. Ahmed"></div>
      <button class="btn btn-primary" id="dept-save-btn" style="width:100%;padding:11px;" onclick="submitNewDepartment('${parentId||""}')">Save</button>
    </div>
  </div>`;
}
async function submitNewDepartment(parentId){
  const name = document.getElementById("dept-name-input").value.trim();
  const manager = document.getElementById("dept-manager-input").value.trim();
  if(!name){ showToast("Department name is required", true); return; }
  if(departments.some(d=>d.name.toLowerCase()===name.toLowerCase())){ showToast("This department already exists", true); return; }
  const btn = document.getElementById("dept-save-btn");
  if (btn) { btn.disabled = true; btn.textContent = "Saving..."; }
  const { error } = await _supabase.from("departments").insert({ name, manager: manager || null, parent_id: parentId || null });
  if (error) { showToast("Failed to save: " + error.message, true); if (btn){btn.disabled=false;btn.textContent="Save";} return; }
  await loadDepartments();
  await loadEmployees();
  closeModal();
  renderApp();
}
async function deleteDepartment(id){
  const dept = departments.find(d=>d.id===id);
  if(!dept) return;
  const count = employees.filter(e=>e.departmentId===id).length;
  const hasChildren = departments.some(d=>d.parentId===id);
  if(count>0){ showToast("Cannot delete a department with employees — move them first", true); return; }
  if(hasChildren){ showToast("Cannot delete a department with sub-departments — remove them first", true); return; }
  const { error } = await _supabase.from("departments").delete().eq("id", id);
  if (error) { showToast("Failed to delete: " + error.message, true); return; }
  await loadDepartments();
  closeModal();
  renderApp();
}
async function assignEmployeeToDept(empId, deptId){
  const dept = departments.find(d=>d.id===deptId);
  if(!dept) return;
  const { error } = await _supabase.from("employees").update({ department_id: deptId }).eq("id", empId);
  if (error) { showToast("Failed: " + error.message, true); return; }
  await loadEmployees();
  showToast("Employee added to " + dept.name);
  openDepartmentModal(deptId);
}
function openDepartmentModal(id){
  const dept = departments.find(d=>d.id===id);
  if(!dept) return;
  const deptEmployees = employees.filter(e=>e.departmentId===dept.id);
  document.getElementById("modalRoot").innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closeModal();">
    <div class="modal-box" style="max-width:480px;">
      <div class="modal-head">
        <h3>${esc(dept.name)}</h3>
        <button onclick="closeModal()">✕</button>
      </div>
      ${dept.manager ? `<div style="color:var(--primary);font-weight:700;font-size:13px;margin-bottom:10px;">Manager: ${esc(dept.manager)}</div>` : ""}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="color:var(--ink-soft);font-size:13px;">${deptEmployees.length} employee${deptEmployees.length===1?"":"s"}</div>
        <button class="icon-btn danger" onclick="deleteDepartment('${dept.id}')" title="Delete department">🗑 Delete department</button>
      </div>
      ${deptEmployees.length===0 ? `<div style="color:var(--ink-soft);border:1px dashed var(--border);border-radius:12px;text-align:center;padding:20px;font-size:13px;margin-bottom:14px;">No employees in this department yet.</div>` : `
      <div style="max-height:280px;overflow-y:auto;margin-bottom:14px;">
        ${deptEmployees.map(e=>`
          <div class="emp-row" style="cursor:default;">
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="emp-avatar">${esc(e.name[0]||'؟')}</div>
              <div><div class="emp-name">${esc(e.name)}</div><div class="emp-sub">#${esc(e.employeeNumber)}</div></div>
            </div>
            <button class="icon-btn" onclick='closeModal(); openEmployeeModal(${JSON.stringify(e).replace(/'/g,"&#39;")})'>✎</button>
          </div>`).join("")}
      </div>`}

      <div style="font-weight:800;font-size:13px;margin:14px 0 8px;color:var(--ink);">Add an existing employee with no department:</div>
      ${(() => {
        const unassigned = employees.filter(e => !e.departmentId);
        if (unassigned.length === 0) {
          return `<div style="color:var(--ink-soft);font-size:12px;margin-bottom:14px;">No unassigned employees right now.</div>`;
        }
        return `<div style="max-height:200px;overflow-y:auto;margin-bottom:14px;border:1px solid var(--border);border-radius:12px;padding:6px;">
          ${unassigned.map(e => `
            <div class="emp-row" style="cursor:default;">
              <div style="display:flex;align-items:center;gap:10px;">
                <div class="emp-avatar">${esc(e.name[0]||'؟')}</div>
                <div><div class="emp-name">${esc(e.name)}</div><div class="emp-sub">#${esc(e.employeeNumber)}</div></div>
              </div>
              <button class="btn btn-primary btn-sm" onclick="assignEmployeeToDept('${e.id}','${dept.id}')">+ Add</button>
            </div>`).join("")}
        </div>`;
      })()}

      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" style="flex:1;padding:11px;" onclick="closeModal(); openEmployeeModal({departmentId:'${dept.id}'})">+ New employee</button>
        <button class="btn btn-outline" style="flex:1;padding:11px;" onclick="addDepartment('${dept.id}')">+ Add sub-department</button>
      </div>
    </div>
  </div>`;
}

/* ============================================================================
   MODALS
   ========================================================================== */
function closeModal(){ document.getElementById("modalRoot").innerHTML = ""; }

function openEmployeeModal(emp){
  emp = emp || {};
  const deptOptions = departments.map(d =>
    `<option value="${d.id}" ${emp.departmentId===d.id?'selected':''}>${esc(deptLabel(d))}</option>`).join("");
  document.getElementById("modalRoot").innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closeModal();">
    <div class="modal-box">
      <div class="modal-head"><h3>${emp.id?'تعديل بيانات الموظف':'إضافة موظف جديد'}</h3><button onclick="closeModal()">✕</button></div>
      <div class="field"><label>الاسم *</label><input id="f-name" value="${esc(emp.name)||''}" placeholder="اسم الموظف"></div>
      <div class="field"><label>الرقم الوظيفي</label><input id="f-empnum" value="${esc(emp.employeeNumber)||''}" placeholder="مثال: 5002"></div>
      <div class="field-row">
        <div class="field"><label>تاريخ الميلاد</label><input id="f-dob" type="date" value="${emp.dob||''}"></div>
        <div class="field"><label>العمر</label><input id="f-age" type="number" value="${emp.age!=null?emp.age:''}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>سنوات الخبرة</label><input id="f-exp" type="number" value="${emp.experience!=null?emp.experience:''}"></div>
        <div class="field"><label>تاريخ الالتحاق</label><input id="f-join" type="date" value="${emp.joinDate||''}"></div>
      </div>
      <div class="field"><label>رقم الهاتف</label><input id="f-phone" value="${esc(emp.phone)||''}" placeholder="09xxxxxxxx"></div>
      <div class="field"><label>القسم</label>
        <select id="f-dept"><option value="">بدون قسم</option>${deptOptions}</select>
      </div>
      <div class="field"><label>ملاحظات (اختياري)</label><textarea id="f-notes" rows="2">${esc(emp.notes)||''}</textarea></div>
      <button class="btn btn-primary" id="emp-save-btn" style="width:100%;padding:11px;" onclick="submitEmployeeForm('${emp.id||''}')">حفظ</button>
    </div>
  </div>`;
}
function submitEmployeeForm(id){
  const name = document.getElementById("f-name").value.trim();
  if(!name){ showToast("الاسم مطلوب", true); return; }
  const btn = document.getElementById("emp-save-btn");
  if (btn) { btn.disabled = true; btn.textContent = "جاري الحفظ..."; }
  const data = {
    id: id || undefined,
    name,
    employeeNumber: document.getElementById("f-empnum").value.trim(),
    dob: document.getElementById("f-dob").value,
    age: document.getElementById("f-age").value ? parseInt(document.getElementById("f-age").value) : "",
    experience: document.getElementById("f-exp").value ? parseInt(document.getElementById("f-exp").value) : "",
    joinDate: document.getElementById("f-join").value,
    phone: document.getElementById("f-phone").value.trim(),
    departmentId: document.getElementById("f-dept").value || null,
    notes: document.getElementById("f-notes").value.trim(),
  };
  saveEmployee(data);
}

function openRecordModal(rec){
  rec = rec || {};
  const typeOptions = Object.keys(LEAVE_TYPES).map(k=>`<option value="${k}" ${rec.type===k?'selected':''}>${LEAVE_TYPES[k].label}</option>`).join("");
  document.getElementById("modalRoot").innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closeModal();">
    <div class="modal-box">
      <div class="modal-head"><h3>${rec.id?'تعديل يوم الإجازة':'إضافة يوم إجازة'}</h3><button onclick="closeModal()">✕</button></div>
      <div class="field"><label>نوع الإجازة</label><select id="r-type">${typeOptions}</select></div>
      <div class="field-row">
        <div class="field"><label>تاريخ البداية</label><input id="r-start" type="date" value="${rec.startDate||''}" oninput="updateRecordDaysPreview()"></div>
        <div class="field"><label>تاريخ النهاية</label><input id="r-end" type="date" value="${rec.endDate||''}" oninput="updateRecordDaysPreview()"></div>
      </div>
      <div style="color:var(--ink-soft);font-size:13px;margin-bottom:10px;">عدد الأيام: <strong id="r-days-preview" style="color:var(--ink);">${daysBetween(rec.startDate,rec.endDate)||0}</strong></div>
      <div class="field"><label>ملاحظات (اختياري)</label><textarea id="r-notes" rows="2">${esc(rec.notes)||''}</textarea></div>
      <button class="btn btn-primary" id="rec-save-btn" style="width:100%;padding:11px;" onclick="submitRecordForm('${rec.id||''}')">حفظ</button>
    </div>
  </div>`;
}
function updateRecordDaysPreview(){
  const s=document.getElementById("r-start").value, e=document.getElementById("r-end").value;
  document.getElementById("r-days-preview").textContent = daysBetween(s,e) || 0;
}
function submitRecordForm(id){
  const startDate = document.getElementById("r-start").value;
  const endDate = document.getElementById("r-end").value;
  const days = daysBetween(startDate, endDate);
  if(!startDate || !endDate || days<=0){ showToast("تحقق من التواريخ المدخلة", true); return; }
  const btn = document.getElementById("rec-save-btn");
  if (btn) { btn.disabled = true; btn.textContent = "جاري الحفظ..."; }
  saveRecord({
    id: id || undefined,
    type: document.getElementById("r-type").value,
    startDate, endDate,
    notes: document.getElementById("r-notes").value.trim(),
  });
}

function openConfirmModal(message, onConfirm){
  window._confirmAction = onConfirm;
  document.getElementById("modalRoot").innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closeModal();">
    <div class="modal-box">
      <div class="modal-head"><h3>تأكيد الحذف</h3><button onclick="closeModal()">✕</button></div>
      <p style="font-size:14px;color:var(--ink-soft);margin-bottom:16px;">${esc(message)}</p>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline" style="flex:1;padding:11px;" onclick="closeModal()">إلغاء</button>
        <button class="btn btn-danger" style="flex:1;padding:11px;" onclick="window._confirmAction && window._confirmAction()">حذف نهائيًا</button>
      </div>
    </div>
  </div>`;
}
/* ============================================================================
   MAIN RENDER
   ========================================================================== */
function renderApp(){
  document.getElementById("empCount").textContent = employees.length + " موظف";
  const view = page==="leaves" ? renderLeaves() : page==="reports" ? renderReports() : page==="org" ? renderOrgChart() : renderHome();
  document.getElementById("app").innerHTML = view;
}
function renderAll(){ renderApp(); }
</script>
</body>
</html>
