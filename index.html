<title>AL AJYAL - نظام الموظفين والإجازات</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;800&family=Tajawal:wght@400;500;700&display=swap');
  :root{
    --bg:#F5F3EC; --surface:#FFFFFF; --ink:#1E2A2C; --ink-soft:#657072;
    --border:#E6DEDD; --primary:#8D3532; --primary-light:#F1E6E6; --primary-dark:#4D1D1B;
    --sick:#3B5B7A; --sick-light:#E7EDF2; --emg:#C98A2C; --emg-light:#FAF0DF; --danger:#B23A48;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Tajawal',sans-serif;min-height:100vh;}
  input,select,textarea{font-family:'Tajawal',sans-serif;}
  ::placeholder{color:#9BA3A4;}
  button{cursor:pointer;font-family:'Tajawal',sans-serif;border:none;}
  header.app-header{background:var(--primary-dark);color:#fff;border-bottom:4px solid var(--primary);
    padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand img{height:40px;}
  .brand-name{font-family:'Cairo',sans-serif;font-weight:800;font-size:19px;line-height:1;}
  .brand-sub{font-size:11px;color:rgba(255,255,255,.8);margin-top:4px;}
  .header-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .btn{border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;transition:opacity .15s;}
  .btn:hover{opacity:.9;}
  .btn-white{background:#fff;color:var(--primary-dark);}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--ink);}
  .app-header .btn-outline{color:#fff;border-color:rgba(255,255,255,.5);}
  .app-header .btn-outline:hover{background:rgba(255,255,255,.1);}
  .btn-danger-outline{background:transparent;border:1px solid #E8C9CC;color:var(--danger);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-sm{padding:6px 10px;font-size:12px;}
  nav.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:4px;}
  nav.tabs button{background:transparent;padding:12px 16px;font-size:14px;color:var(--ink-soft);border-bottom:3px solid transparent;}
  nav.tabs button.active{color:var(--primary);font-weight:800;border-bottom-color:var(--primary);}
  .layout{display:flex;min-height:calc(100vh - 118px);}
  @media (max-width:760px){.layout{flex-direction:column;}}
  aside.sidebar{width:300px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);padding:16px;}
  @media (max-width:760px){aside.sidebar{width:100%;border-left:none;border-bottom:1px solid var(--border);}}
  .search-wrap{position:relative;margin-bottom:14px;}
  .search-wrap input{width:100%;padding:9px 34px 9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-size:13px;outline:none;}
  .search-wrap svg{position:absolute;right:10px;top:9px;color:var(--ink-soft);}
  .emp-row{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:right;
    background:transparent;border:1px solid transparent;border-radius:8px;padding:10px;margin-bottom:6px;font-family:'Tajawal',sans-serif;}
  .emp-row:hover{opacity:.9;}
  .emp-row.selected{background:var(--primary-light);border-color:var(--primary);}
  .emp-avatar{width:32px;height:32px;border-radius:999px;display:flex;align-items:center;justify-content:center;
    font-family:'Cairo',sans-serif;font-weight:800;font-size:13px;background:var(--border);color:var(--ink);flex-shrink:0;}
  .emp-row.selected .emp-avatar{background:var(--primary);color:#fff;}
  .emp-name{font-size:13px;font-weight:700;}
  .emp-sub{font-size:11px;color:var(--ink-soft);}
  main.content{flex:1;padding:20px;max-width:100%;}
  @media (min-width:760px){main.content{padding:28px;}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;}
  .empty-state{text-align:center;color:var(--ink-soft);padding:60px 20px;}
  .section-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:18px;margin:0 0 12px;}
  .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;border-top:1px dashed var(--border);margin-top:18px;padding-top:18px;}
  @media (min-width:640px){.info-grid{grid-template-columns:repeat(4,1fr);}}
  .info-field .info-label{font-size:11px;color:var(--ink-soft);display:flex;align-items:center;gap:4px;margin-bottom:3px;}
  .info-field .info-value{font-weight:700;font-size:14px;}
  .leave-cards{display:grid;grid-template-columns:1fr;gap:12px;}
  @media (min-width:640px){.leave-cards{grid-template-columns:repeat(3,1fr);}}
  .leave-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;border-top:4px solid var(--primary);}
  .leave-card .lt-title{font-weight:800;font-size:13px;margin-bottom:8px;}
  .leave-card .lt-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .leave-card label{font-size:11px;color:var(--ink-soft);display:block;margin-bottom:3px;}
  .leave-card input[type=number]{width:100%;border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:13px;background:var(--bg);}
  .rem-pill{border-radius:8px;padding:8px 12px;font-size:13px;font-weight:800;display:flex;justify-content:space-between;}
  table.datatable{width:100%;border-collapse:collapse;font-size:13px;min-width:560px;}
  table.datatable thead tr{background:var(--primary-light);color:var(--primary-dark);}
  table.datatable th,table.datatable td{padding:9px 10px;text-align:right;}
  table.datatable tbody tr{border-top:1px solid var(--border);}
  table.datatable tbody tr:nth-child(even){background:var(--bg);}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow-x:auto;}
  .badge{border-radius:999px;padding:3px 9px;font-size:11px;font-weight:800;}
  .modal-overlay{position:fixed;inset:0;background:rgba(20,25,26,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:60;}
  .modal-box{background:var(--surface);max-width:440px;width:100%;max-height:90vh;overflow-y:auto;border-radius:16px;padding:20px;}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .modal-head h3{font-family:'Cairo',sans-serif;font-weight:800;font-size:17px;margin:0;}
  .modal-head button{background:none;color:var(--ink-soft);font-size:18px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--ink-soft);font-weight:800;margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:14px;outline:none;background:var(--bg);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .icon-btn{background:none;color:var(--ink-soft);}
  .icon-btn.danger{color:var(--danger);}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--primary-dark);color:#fff;
    padding:10px 18px;border-radius:999px;font-size:13px;z-index:80;opacity:0;transition:opacity .25s;pointer-events:none;}
  .toast.show{opacity:1;}
  .backup-note{font-size:11px;color:var(--ink-soft);margin-top:6px;line-height:1.6;}
  @media print{
    header, nav.tabs, aside.sidebar, .header-actions, .search-wrap{display:none !important;}
    body.printing-single > *:not(#printHost){display:none !important;}
    body.printing-single #printHost{display:block !important;padding:20px;}
  }
  #printHost{display:none;}
  @media (min-width:640px){.stat-grid{grid-template-columns:repeat(4,1fr) !important;}}
  #app > div.content{padding:20px;}
  @media (min-width:760px){#app > div.content{padding:28px;}}
  .org-wrap{text-align:center;padding:20px 10px 40px;}
  .org-hub{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--surface),var(--primary-light));
    border:2px solid var(--primary);border-radius:18px;padding:16px 30px;box-shadow:0 10px 26px rgba(0,0,0,.08);}
  .org-hub-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:19px;color:var(--primary-dark);}
  .org-stem{width:2px;height:26px;background:var(--border);margin:0 auto;}
  .org-connector{position:relative;height:26px;max-width:900px;margin:0 auto;}
  .org-connector-line{position:absolute;top:0;height:2px;background:var(--border);}
  .org-row{display:flex;justify-content:center;gap:16px;max-width:960px;margin:0 auto;flex-wrap:wrap;}
  .org-branch{flex:1;min-width:170px;max-width:220px;display:flex;flex-direction:column;align-items:center;}
  .org-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 14px;width:100%;
    cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.06);transition:box-shadow .15s,transform .15s;text-align:center;}
  .org-box:hover{box-shadow:0 12px 26px rgba(0,0,0,.12);transform:translateY(-2px);}
  .org-box .org-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    background:var(--primary-light);margin:0 auto 10px;}
  .org-box .org-name{font-family:'Cairo',sans-serif;font-weight:800;font-size:14px;color:var(--ink);margin-bottom:4px;}
  .org-box .org-count{font-size:11px;color:var(--ink-soft);}
  .org-add-branch{border:2px dashed var(--border);background:transparent;border-radius:16px;padding:16px 14px;
    width:100%;color:var(--ink-soft);font-size:13px;font-weight:700;min-height:110px;display:flex;align-items:center;justify-content:center;}
  .org-add-branch:hover{border-color:var(--primary);color:var(--primary);}
  .org-tagline{display:inline-flex;align-items:center;gap:12px;border:2px dashed var(--primary);border-radius:14px;
    padding:14px 26px;margin-top:36px;color:var(--primary-dark);font-weight:800;font-family:'Cairo',sans-serif;font-size:13px;background:var(--primary-light);}
</style>

/* ============== HELPERS ============== */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
const MONTHS_AR = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
function fmtDate(d){
  if(!d) return "—";
  const date = new Date(d + "T00:00:00");
  if (isNaN(date)) return "—";
  return date.getDate() + " " + MONTHS_AR[date.getMonth()] + " " + date.getFullYear();
}
function remaining(t){ return Math.round((t.balance - t.taken) * 100) / 100; }
function daysBetween(start,end){
  if(!start||!end) return 0;
  const s=new Date(start), e=new Date(end);
  const diff = Math.round((e-s)/(1000*60*60*24)) + 1;
  return diff>0?diff:0;
}
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove("show"), 2200);
}

/* ============== MONTHLY GROUPING & CHARTS ============== */
function monthKey(dateStr){
  const d = new Date(dateStr + "T00:00:00");
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
}
function monthLabel(key){
  const [y,m] = key.split("-");
  return MONTHS_AR[parseInt(m,10)-1] + " " + y;
}
function groupRecordsByMonth(records){
  const map = {};
  records.forEach(r=>{
    const key = monthKey(r.startDate);
    if(!map[key]) map[key] = [];
    map[key].push(r);
  });
  return Object.keys(map).sort().reverse().map(k=>({
    key: k, label: monthLabel(k),
    records: map[k].sort((a,b)=> new Date(b.startDate) - new Date(a.startDate)),
    total: map[k].reduce((s,r)=>s+r.days,0),
  }));
}
function aggregateMonthly(records){
  const map = {};
  records.forEach(r=>{
    const key = monthKey(r.startDate);
    if(!map[key]) map[key] = { annual:0, sick:0, emergency:0, total:0 };
    map[key][r.type] = (map[key][r.type]||0) + r.days;
    map[key].total += r.days;
  });
  return Object.keys(map).sort().map(k=>({ key:k, label: monthLabel(k), ...map[k] }));
}
function renderGroupedRecords(records, editable){
  if(!records || records.length===0){
    return `<div style="color:var(--ink-soft);border:1px dashed var(--border);border-radius:12px;text-align:center;padding:24px;font-size:13px;">لا توجد أيام إجازة مسجّلة بتواريخ محددة بعد.</div>`;
  }
  const groups = groupRecordsByMonth(records);
  return groups.map(g => `
    <div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;background:var(--primary-light);color:var(--primary-dark);border-radius:8px;padding:8px 12px;font-weight:800;font-size:13px;margin-bottom:6px;">
        <span>${g.label}</span><span>${g.total} يوم</span>
      </div>
      <div class="table-wrap">
        <table class="datatable">
          <thead><tr><th>النوع</th><th>من</th><th>إلى</th><th>الأيام</th><th>ملاحظات</th>${editable?'<th>إجراءات</th>':''}</tr></thead>
          <tbody>${g.records.map(r=>{
            const t = LEAVE_TYPES[r.type] || LEAVE_TYPES.annual;
            return `<tr>
              <td><span class="badge" style="background:${t.light};color:${t.color};">${t.label}</span></td>
              <td style="color:var(--ink-soft);">${fmtDate(r.startDate)}</td>
              <td style="color:var(--ink-soft);">${fmtDate(r.endDate)}</td>
              <td><strong>${r.days}</strong></td>
              <td style="color:var(--ink-soft);">${esc(r.notes)||'—'}</td>
              ${editable ? `<td>
                <button class="icon-btn" onclick='openRecordModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>✎</button>
                <button class="icon-btn danger" onclick="openConfirmModal('سيتم حذف يوم الإجازة هذا نهائيًا. هل أنت متأكد؟', () => deleteRecord('${r.id}'))">🗑</button>
              </td>` : ''}
            </tr>`;
          }).join("")}</tbody>
        </table>
      </div>
    </div>`).join("");
}
function svgMonthlyChart(months){
  if(!months || months.length===0){
    return `<div style="color:var(--ink-soft);text-align:center;padding:30px 10px;font-size:13px;border:1px dashed var(--border);border-radius:12px;">لا توجد بيانات كافية بعد لعرض الرسم البياني (أضف أيام إجازة بتواريخ محددة).</div>`;
  }
  const w = 680, h = 240, padL = 8, padR = 8, padB = 40, padT = 26;
  const chartW = w - padL - padR;
  const chartH = h - padT - padB;
  const maxVal = Math.max(...months.map(m=>m.total), 1);
  const gap = chartW / months.length;
  const barW = Math.min(gap * 0.55, 46);
  const colors = { annual:"#8D3532", sick:"#3B5B7A", emergency:"#C98A2C" };
  let bars = "";
  months.forEach((m,i)=>{
    const x = padL + i*gap + (gap-barW)/2;
    let yCursor = h - padB;
    ["annual","sick","emergency"].forEach(type=>{
      const val = m[type] || 0;
      if(val<=0) return;
      const segH = (val/maxVal) * chartH;
      yCursor -= segH;
      bars += `<rect x="${x.toFixed(1)}" y="${yCursor.toFixed(1)}" width="${barW.toFixed(1)}" height="${segH.toFixed(1)}" fill="${colors[type]}" rx="2"/>`;
    });
    bars += `<text x="${(x+barW/2).toFixed(1)}" y="${(yCursor-6).toFixed(1)}" font-size="11" fill="#1E2A2C" text-anchor="middle" font-weight="700">${m.total}</text>`;
    bars += `<text x="${(x+barW/2).toFixed(1)}" y="${h-padB+16}" font-size="10" fill="#657072" text-anchor="middle">${m.label}</text>`;
  });
  bars += `<line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="#E6DEDD" stroke-width="1"/>`;
  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;max-height:260px;display:block;">${bars}</svg>
    <div style="display:flex;gap:16px;justify-content:center;margin-top:6px;font-size:12px;color:var(--ink-soft);flex-wrap:wrap;">
      <span><span style="display:inline-block;width:10px;height:10px;background:${colors.annual};border-radius:2px;margin-left:4px;"></span>سنوية</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:${colors.sick};border-radius:2px;margin-left:4px;"></span>مرضية</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:${colors.emergency};border-radius:2px;margin-left:4px;"></span>طارئة</span>
    </div>`;
}

/* ============== BACKUP ============== */
function downloadBackup(){
  const blob = new Blob([JSON.stringify(employees, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "aos-employees-backup-" + new Date().toISOString().slice(0,10) + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast("تم تنزيل النسخة الاحتياطية");
}
function restoreBackup(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data)) throw new Error("صيغة غير صحيحة");
      employees = data;
      saveData();
      selectedId = null; leaveSelectedId = null; leaveDraft = null;
      renderAll();
      showToast("تم استيراد البيانات بنجاح");
    } catch(e){ showToast("فشل الاستيراد: " + e.message); }
  };
  reader.readAsText(file);
  evt.target.value = "";
}

/* ============== LEAVE BALANCE / RECORDS ============== */
function selectLeaveEmployee(id){
  leaveSelectedId = id;
  const emp = employees.find(e=>e.id===id);
  leaveDraft = emp ? JSON.parse(JSON.stringify(emp.leaves)) : null;
  renderApp();
}
function updateDraftField(type, field, value){
  if(!leaveDraft) return;
  leaveDraft[type][field] = parseFloat(value) || 0;
  const rem = remaining(leaveDraft[type]);
  const el = document.getElementById("rem-" + type);
  if(el) el.value = rem;
}
function updateDraftRemaining(type, value){
  if(!leaveDraft) return;
  const rem = parseFloat(value) || 0;
  // نبقي الرصيد كما هو ونحسب "المستخدم" تلقائيًا من الفرق، عشان تقدر تعدّل المتبقي مباشرة
  leaveDraft[type].taken = Math.round((leaveDraft[type].balance - rem) * 100) / 100;
  const el = document.getElementById("taken-" + type);
  if(el) el.value = leaveDraft[type].taken;
}
function saveLeaveDraft(){
  if(!leaveSelectedId || !leaveDraft) return;
  employees = employees.map(e => e.id===leaveSelectedId ? {...e, leaves: leaveDraft} : e);
  saveData();
  showToast("تم حفظ رصيد الإجازات");
  renderApp();
}
function saveRecord(data){
  const days = daysBetween(data.startDate, data.endDate);
  const rec = {...data, days};
  employees = employees.map(e=>{
    if(e.id!==leaveSelectedId) return e;
    const records = e.records || [];
    const oldRec = rec.id ? records.find(r=>r.id===rec.id) : null;
    const updatedRecords = rec.id ? records.map(r=>r.id===rec.id?rec:r) : [...records, {...rec, id: uid()}];

    // اخصم/أضف تلقائيًا على "المستخدم" لنوع الإجازة بناءً على الأيام
    const leaves = JSON.parse(JSON.stringify(e.leaves));
    if(oldRec){
      leaves[oldRec.type].taken = Math.round((leaves[oldRec.type].taken - oldRec.days) * 100) / 100;
    }
    leaves[rec.type].taken = Math.round((leaves[rec.type].taken + days) * 100) / 100;

    return {...e, records: updatedRecords, leaves};
  });
  saveData();
  const updatedEmp = employees.find(e=>e.id===leaveSelectedId);
  if(updatedEmp) leaveDraft = JSON.parse(JSON.stringify(updatedEmp.leaves));
  closeModal();
  showToast("تم إضافة الإجازة وخصمها من الرصيد تلقائيًا");
  renderApp();
}
function deleteRecord(id){
  employees = employees.map(e=>{
    if(e.id!==leaveSelectedId) return e;
    const records = e.records || [];
    const rec = records.find(r=>r.id===id);
    const leaves = JSON.parse(JSON.stringify(e.leaves));
    if(rec) leaves[rec.type].taken = Math.max(0, Math.round((leaves[rec.type].taken - rec.days) * 100) / 100);
    return {...e, records: records.filter(r=>r.id!==id), leaves};
  });
  saveData();
  const updatedEmp = employees.find(e=>e.id===leaveSelectedId);
  if(updatedEmp) leaveDraft = JSON.parse(JSON.stringify(updatedEmp.leaves));
  closeModal();
  showToast("تم حذف يوم الإجازة وإرجاعه إلى الرصيد");
  renderApp();
}

function pickDeptIcon(name){
  const n = (name||"").toLowerCase();
  if(/مال|finance/.test(n)) return DEPT_ICONS.finance;
  if(/موارد|بشري|hr|human/.test(n)) return DEPT_ICONS.hr;
  if(/لوجست|logistic/.test(n)) return DEPT_ICONS.logistics;
  if(/procurement|مشتريات|purchas/.test(n)) return DEPT_ICONS.procurement;
  if(/operation|تشغيل/.test(n)) return DEPT_ICONS.operation;
  if(/business|أعمال|اعمال|مبيعات/.test(n)) return DEPT_ICONS.business;
  return DEPT_ICONS.default;
}
function renderDeptNode(dep, withStem){
  const count = employees.filter(e=>(e.department||"").trim()===dep.name).length;
  const children = departments.filter(d=>d.parentId===dep.id);
  const leftPct = children.length>0 ? (50/children.length) : 0;
  return `
  <div class="org-branch">
    ${withStem ? '<div class="org-stem"></div>' : ''}
    <div class="org-box" onclick="openDepartmentModal('${dep.id}')">
      <div class="org-icon">${pickDeptIcon(dep.name)}</div>
      <div class="org-name">${esc(dep.name)}</div>
      ${dep.manager ? `<div style="font-size:12px;color:var(--primary);font-weight:700;margin-top:2px;">${esc(dep.manager)}</div>` : ""}
      <div class="org-count">${count} employee${count===1?"":"s"}</div>
    </div>
    ${children.length>0 ? `
      <div class="org-stem"></div>
      <div class="org-connector"><div class="org-connector-line" style="left:${leftPct}%;right:${leftPct}%;"></div></div>
      <div class="org-row">${children.map(c=>renderDeptNode(c, true)).join("")}</div>
    ` : ""}
  </div>`;
}
function renderOrgChart(){
  const roots = departments.filter(d=>!d.parentId);
  const branches = roots.map(dep=>renderDeptNode(dep, false)).join("");

  return `
  <div class="content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
      <div class="section-title" style="margin:0;">Organization Chart</div>
      <button class="btn btn-outline btn-sm" onclick="addDepartment(null)">+ Add Department</button>
    </div>
    <div class="backup-note" style="margin-bottom:10px;">Click any department to view its employees, add a sub-department under it, or add an employee directly.</div>

    <div class="org-wrap">
      <div class="org-row">
        ${branches}
        <div class="org-branch">
          <button class="org-add-branch" onclick="addDepartment(null)">+ New Department</button>
        </div>
      </div>
      <div class="org-tagline">🛡 Working together for a stronger and smarter future</div>
    </div>
  </div>`;
}
function addDepartment(parentId){
  const parent = parentId ? departments.find(d=>d.id===parentId) : null;
  document.getElementById("modalRoot").innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closeModal();">
    <div class="modal-box">
      <div class="modal-head"><h3>${parent ? "Add Sub-department under " + esc(parent.name) : "Add Department"}</h3><button onclick="closeModal()">✕</button></div>
      <div class="field"><label>Department name</label><input id="dept-name-input" placeholder="e.g. Marketing"></div>
      <div class="field"><label>Manager / Responsible (optional)</label><input id="dept-manager-input" placeholder="e.g. Ahmed"></div>
      <button class="btn btn-primary" style="width:100%;padding:11px;" onclick="submitNewDepartment('${parentId||""}')">Save</button>
    </div>
  </div>`;
}
function submitNewDepartment(parentId){
  const name = document.getElementById("dept-name-input").value.trim();
  const manager = document.getElementById("dept-manager-input").value.trim();
  if(!name){ showToast("Department name is required"); return; }
  if(departments.some(d=>d.name.toLowerCase()===name.toLowerCase())){ showToast("This department already exists"); return; }
  departments.push({ id: uid(), name, manager, parentId: parentId || null });
  saveOrgData();
  closeModal();
  renderApp();
}
function deleteDepartment(id){
  const dep = departments.find(d=>d.id===id);
  if(!dep) return;
  const count = employees.filter(e=>(e.department||"").trim()===dep.name).length;
  const hasChildren = departments.some(d=>d.parentId===id);
  if(count>0){ showToast("Cannot delete a department with employees — move them first"); return; }
  if(hasChildren){ showToast("Cannot delete a department with sub-departments — remove them first"); return; }
  departments = departments.filter(d=>d.id!==id);
  saveOrgData();
  closeModal();
  renderApp();
}
function assignEmployeeToDept(empId, deptId){
  const dept = departments.find(d=>d.id===deptId);
  if(!dept) return;
  employees = employees.map(e => e.id===empId ? { ...e, department: dept.name } : e);
  saveData();
  showToast("Employee added to " + dept.name);
  openDepartmentModal(deptId);
}
function openDepartmentModal(id){
  const dept = departments.find(d=>d.id===id);
  if(!dept) return;
  const deptEmployees = employees.filter(e=>(e.department||"").trim()===dept.name);
  document.getElementById("modalRoot").innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closeModal();">
    <div class="modal-box" style="max-width:480px;">
      <div class="modal-head">
        <h3>${esc(dept.name)}</h3>
        <button onclick="closeModal()">✕</button>
      </div>
      ${dept.manager ? `<div style="color:var(--primary);font-weight:700;font-size:13px;margin-bottom:10px;">Manager: ${esc(dept.manager)}</div>` : ""}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="color:var(--ink-soft);font-size:13px;">${deptEmployees.length} employee${deptEmployees.length===1?"":"s"}</div>
        <button class="icon-btn danger" onclick="deleteDepartment('${dept.id}')" title="Delete department">🗑 Delete department</button>
      </div>
      ${deptEmployees.length===0 ? `<div style="color:var(--ink-soft);border:1px dashed var(--border);border-radius:12px;text-align:center;padding:20px;font-size:13px;margin-bottom:14px;">No employees in this department yet.</div>` : `
      <div style="max-height:280px;overflow-y:auto;margin-bottom:14px;">
        ${deptEmployees.map(e=>`
          <div class="emp-row" style="cursor:default;">
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="emp-avatar">${esc(e.name[0]||'؟')}</div>
              <div><div class="emp-name">${esc(e.name)}</div><div class="emp-sub">#${esc(e.employeeNumber)}</div></div>
            </div>
            <button class="icon-btn" onclick='closeModal(); openEmployeeModal(${JSON.stringify(e).replace(/'/g,"&#39;")})'>✎</button>
          </div>`).join("")}
      </div>`}

      <div style="font-weight:800;font-size:13px;margin:14px 0 8px;color:var(--ink);">Add an existing employee with no department:</div>
      ${(() => {
        const unassigned = employees.filter(e => !(e.department||"").trim());
        if (unassigned.length === 0) {
          return `<div style="color:var(--ink-soft);font-size:12px;margin-bottom:14px;">No unassigned employees right now.</div>`;
        }
        return `<div style="max-height:200px;overflow-y:auto;margin-bottom:14px;border:1px solid var(--border);border-radius:12px;padding:6px;">
          ${unassigned.map(e => `
            <div class="emp-row" style="cursor:default;">
              <div style="display:flex;align-items:center;gap:10px;">
                <div class="emp-avatar">${esc(e.name[0]||'؟')}</div>
                <div><div class="emp-name">${esc(e.name)}</div><div class="emp-sub">#${esc(e.employeeNumber)}</div></div>
              </div>
              <button class="btn btn-primary btn-sm" onclick="assignEmployeeToDept('${e.id}','${dept.id}')">+ Add</button>
            </div>`).join("")}
        </div>`;
      })()}

      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" style="flex:1;padding:11px;" onclick="closeModal(); openEmployeeModal({department:'${dept.name.replace(/'/g,"\\'")}'})">+ New employee</button>
        <button class="btn btn-outline" style="flex:1;padding:11px;" onclick="addDepartment('${dept.id}')">+ Add sub-department</button>
      </div>
    </div>
  </div>`;
}

/* ============== MODALS ============== */
function closeModal(){ document.getElementById("modalRoot").innerHTML = ""; }

function openEmployeeModal(emp){
  emp = emp || {};
  document.getElementById("modalRoot").innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closeModal();">
    <div class="modal-box">
      <div class="modal-head"><h3>${emp.id?'تعديل بيانات الموظف':'إضافة موظف جديد'}</h3><button onclick="closeModal()">✕</button></div>
      <div class="field"><label>الاسم *</label><input id="f-name" value="${esc(emp.name)||''}" placeholder="اسم الموظف"></div>
      <div class="field"><label>الرقم الوظيفي</label><input id="f-empnum" value="${esc(emp.employeeNumber)||''}" placeholder="مثال: 5002"></div>
      <div class="field-row">
        <div class="field"><label>تاريخ الميلاد</label><input id="f-dob" type="date" value="${emp.dob||''}"></div>
        <div class="field"><label>العمر</label><input id="f-age" type="number" value="${emp.age!=null?emp.age:''}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>سنوات الخبرة</label><input id="f-exp" type="number" value="${emp.experience!=null?emp.experience:''}"></div>
        <div class="field"><label>تاريخ الالتحاق</label><input id="f-join" type="date" value="${emp.joinDate||''}"></div>
      </div>
      <div class="field"><label>رقم الهاتف</label><input id="f-phone" value="${esc(emp.phone)||''}" placeholder="09xxxxxxxx"></div>
      <div class="field"><label>القسم / المسمى الوظيفي</label><input id="f-dept" value="${esc(emp.department)||''}"></div>
      <button class="btn btn-primary" style="width:100%;padding:11px;" onclick="submitEmployeeForm('${emp.id||''}')">حفظ</button>
    </div>
  </div>`;
}
function submitEmployeeForm(id){
  const name = document.getElementById("f-name").value.trim();
  if(!name){ showToast("الاسم مطلوب"); return; }
  const data = {
    id: id || undefined,
    name,
    employeeNumber: document.getElementById("f-empnum").value.trim(),
    dob: document.getElementById("f-dob").value,
    age: document.getElementById("f-age").value ? parseInt(document.getElementById("f-age").value) : "",
    experience: document.getElementById("f-exp").value ? parseInt(document.getElementById("f-exp").value) : "",
    joinDate: document.getElementById("f-join").value,
    phone: document.getElementById("f-phone").value.trim(),
    department: document.getElementById("f-dept").value.trim(),
  };
  saveEmployee(data);
}

function openRecordModal(rec){
  rec = rec || {};
  const typeOptions = Object.keys(LEAVE_TYPES).map(k=>`<option value="${k}" ${rec.type===k?'selected':''}>${LEAVE_TYPES[k].label}</option>`).join("");
  document.getElementById("modalRoot").innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closeModal();">
    <div class="modal-box">
      <div class="modal-head"><h3>${rec.id?'تعديل يوم الإجازة':'إضافة يوم إجازة'}</h3><button onclick="closeModal()">✕</button></div>
      <div class="field"><label>نوع الإجازة</label><select id="r-type">${typeOptions}</select></div>
      <div class="field-row">
        <div class="field"><label>تاريخ البداية</label><input id="r-start" type="date" value="${rec.startDate||''}" oninput="updateRecordDaysPreview()"></div>
        <div class="field"><label>تاريخ النهاية</label><input id="r-end" type="date" value="${rec.endDate||''}" oninput="updateRecordDaysPreview()"></div>
      </div>
      <div style="color:var(--ink-soft);font-size:13px;margin-bottom:10px;">عدد الأيام: <strong id="r-days-preview" style="color:var(--ink);">${daysBetween(rec.startDate,rec.endDate)||0}</strong></div>
      <div class="field"><label>ملاحظات (اختياري)</label><textarea id="r-notes" rows="2">${esc(rec.notes)||''}</textarea></div>
      <button class="btn btn-primary" style="width:100%;padding:11px;" onclick="submitRecordForm('${rec.id||''}')">حفظ</button>
    </div>
  </div>`;
}
function updateRecordDaysPreview(){
  const s=document.getElementById("r-start").value, e=document.getElementById("r-end").value;
  document.getElementById("r-days-preview").textContent = daysBetween(s,e) || 0;
}
function submitRecordForm(id){
  const startDate = document.getElementById("r-start").value;
  const endDate = document.getElementById("r-end").value;
  const days = daysBetween(startDate, endDate);
  if(!startDate || !endDate || days<=0){ showToast("تحقق من التواريخ المدخلة"); return; }
  saveRecord({
    id: id || undefined,
    type: document.getElementById("r-type").value,
    startDate, endDate,
    notes: document.getElementById("r-notes").value.trim(),
  });
}

function openConfirmModal(message, onConfirm){
  window._confirmAction = onConfirm;
  document.getElementById("modalRoot").innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closeModal();">
    <div class="modal-box">
      <div class="modal-head"><h3>تأكيد الحذف</h3><button onclick="closeModal()">✕</button></div>
      <p style="font-size:14px;color:var(--ink-soft);margin-bottom:16px;">${esc(message)}</p>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline" style="flex:1;padding:11px;" onclick="closeModal()">إلغاء</button>
        <button class="btn btn-danger" style="flex:1;padding:11px;" onclick="window._confirmAction && window._confirmAction()">حذف نهائيًا</button>
      </div>
    </div>
  </div>`;
}

/* ============== MAIN RENDER ============== */
function renderApp(){
  document.getElementById("empCount").textContent = employees.length + " موظف";
  const view = page==="leaves" ? renderLeaves() : page==="reports" ? renderReports() : page==="org" ? renderOrgChart() : renderHome();
  document.getElementById("app").innerHTML = view;
}
function renderAll(){ renderApp(); }
/* ============== INIT ============== */
loadData();
loadOrgData();
setPage("home");
</script>
</body>
</html>
